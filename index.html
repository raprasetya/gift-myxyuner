<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Xyun er 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #FFB6C1;
    --lavender: #D8B4FE;
    --mint: #A7F3D0;
    --peach: #FECBA1;
    --cream: #FFF5F7;
    --deep-pink: #EC4899;
    --deep-purple: #7C3AED;
    --text: #4A2040;
    --text-light: #9B6B8A;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--text);
  }

  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle { position: absolute; border-radius: 50%; opacity: 0.4; animation: floatUp linear infinite; }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.4; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .scene {
    display: none; position: relative; z-index: 1;
    min-height: 100vh; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 40px 20px;
  }
  .scene.active { display: flex; }

  /* ========== SCENE 1 ========== */
  #scene1 { background: linear-gradient(160deg, #FFF0F5 0%, #F3E8FF 50%, #E0F7FA 100%); }

  .subtitle-top { font-size: clamp(11px, 3vw, 14px); color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; animation: fadeIn 1s ease; }
  .title-main { font-family: 'Dancing Script', cursive; font-size: clamp(2rem, 8vw, 3.5rem); color: var(--deep-pink); line-height: 1.2; animation: fadeIn 1.2s ease; }
  .hint-text { font-size: clamp(13px, 3.5vw, 15px); color: var(--text-light); margin-top: 8px; animation: pulse 2s ease infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* ===== GIFT BOX ===== */
  .gift-wrapper {
    margin: 28px auto;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s;
    position: relative;
    animation: wobble 3s ease infinite;
  }
  .gift-wrapper:hover { transform: scale(1.05); }
  .gift-wrapper:active { transform: scale(0.95); }

  @keyframes wobble {
    0%,100%{transform:rotate(0)} 20%{transform:rotate(-3deg)} 40%{transform:rotate(3deg)} 60%{transform:rotate(-2deg)} 80%{transform:rotate(2deg)}
  }

  .gift-wrapper::before {
    content: '';
    position: absolute; inset: -14px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,182,193,0.45) 0%, transparent 70%);
    animation: giftGlow 2.4s ease-in-out infinite;
    pointer-events: none; z-index: -1;
  }
  @keyframes giftGlow {
    0%,100%{opacity:0.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.15)}
  }

  .gift-wrapper.knocking { animation: knockKnock 0.5s ease; }
  @keyframes knockKnock {
    0%,100%{transform:rotate(0) translateY(0)}
    15%{transform:rotate(-6deg) translateY(-6px)}
    30%{transform:rotate(6deg) translateY(-3px)}
    45%{transform:rotate(-4deg) translateY(-5px)}
    60%{transform:rotate(4deg) translateY(-2px)}
    75%{transform:rotate(-2deg) translateY(-3px)}
  }

  .gift-inner-star {
    position: absolute; font-size: 16px;
    top: 50%; left: 50%;
    opacity: 0; pointer-events: none;
    animation: starPeek 1.2s ease-in-out infinite;
  }
  .gift-inner-star:nth-child(1){ animation-delay:0s; }
  .gift-inner-star:nth-child(2){ animation-delay:0.4s; }
  .gift-inner-star:nth-child(3){ animation-delay:0.8s; }
  @keyframes starPeek {
    0%,100%{opacity:0;transform:translate(-50%,-50%) scale(0.3) translateY(0)}
    40%{opacity:0.8;transform:translate(-50%,-50%) scale(1) translateY(-18px)}
    70%{opacity:0.5;transform:translate(-50%,-50%) scale(0.8) translateY(-22px)}
  }

  .gift-box {
    width: min(160px, 42vw);
    height: min(140px, 37vw);
    position: relative;
    margin: 0 auto;
  }
  .gift-body {
    width: min(160px, 42vw);
    height: min(100px, 26vw);
    background: linear-gradient(135deg,#FFB6C1,#FF8DA1);
    border-radius: 12px;
    position: absolute;
    bottom: 0;
    box-shadow: 0 8px 24px rgba(255,100,120,0.25);
  }
  .gift-lid {
    width: calc(min(160px, 42vw) + 8px);
    height: min(36px, 9.5vw);
    background: linear-gradient(135deg,#FF8DA1,#EC4899);
    border-radius: 10px;
    position: absolute;
    top: min(30px, 7.5vw);
    left: -4px;
    transition: transform 0.5s ease, opacity 0.5s ease;
    transform-origin: center bottom;
    box-shadow: 0 4px 12px rgba(255,100,120,0.3);
  }
  .gift-ribbon-v {
    width: min(20px, 5vw);
    height: min(100px, 26vw);
    background: linear-gradient(135deg,#FFF176,#FFC107);
    position: absolute;
    bottom: 0;
    left: calc(50% - min(10px, 2.5vw));
    border-radius: 4px;
  }
  .gift-ribbon-h {
    width: min(160px, 42vw);
    height: min(20px, 5vw);
    background: linear-gradient(135deg,#FFF176,#FFC107);
    position: absolute;
    bottom: min(40px, 10.5vw);
    left: 0;
    border-radius: 4px;
  }
  .gift-bow { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: min(60px, 16vw); height: min(40px, 10.5vw); }
  .bow-left, .bow-right {
    position: absolute;
    width: min(28px, 7.5vw);
    height: min(20px, 5vw);
    border-radius: 50%;
    background: linear-gradient(135deg,#FFF176,#FFC107);
    top: min(8px, 2vw);
  }
  .bow-left  { left: 2px;  transform: rotate(-30deg); }
  .bow-right { right: 2px; transform: rotate(30deg); }
  .bow-center {
    position: absolute;
    width: min(16px, 4vw);
    height: min(16px, 4vw);
    background: #FFC107;
    border-radius: 50%;
    top: min(10px, 2.5vw);
    left: calc(50% - min(8px, 2vw));
  }

  .gift-wrapper.opened .gift-lid { transform: rotate(-70deg) translateY(-20px); opacity: 0; }

  .sparkle-container { position: absolute; inset: -40px; pointer-events: none; }
  .sparkle { position: absolute; font-size: 20px; opacity: 0; }
  .sparkle.pop { animation: sparkleOut 0.8s ease forwards; }
  @keyframes sparkleOut {
    0%{opacity:0;transform:scale(0) translate(0,0)} 50%{opacity:1} 100%{opacity:0;transform:scale(1.5) translate(var(--tx),var(--ty))}
  }

  /* ===== ENVELOPE TRANSITION ===== */
  #envelopeOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 9000;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg,#FFF0F5,#F3E8FF,#E0F7FA);
    flex-direction: column;
  }
  #envelopeOverlay.show { display: flex; }

  .envelope-body {
    width: min(260px, 80vw);
    height: min(170px, 52vw);
    background: white;
    border-radius: 4px 4px 12px 12px;
    border: 2px solid #FECDD3;
    position: relative;
    box-shadow: 0 12px 40px rgba(236,72,153,0.2);
    animation: envDrop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes envDrop {
    0%{opacity:0;transform:scale(0.6) translateY(-40px)} 100%{opacity:1;transform:scale(1) translateY(0)}
  }
  .envelope-flap {
    position: absolute; top: 0; left: 0;
    width: min(260px, 80vw);
    height: min(85px, 26vw);
    background: linear-gradient(160deg,#FFB6C1,#EC4899);
    clip-path: polygon(0 0, 50% 70%, 100% 0);
    border-radius: 4px 4px 0 0;
    transform-origin: top center;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
    z-index: 2;
  }
  .envelope-flap.open { transform: rotateX(180deg); }
  .envelope-letter {
    position: absolute; top: 10px; left: 20px; right: 20px; bottom: 10px;
    background: linear-gradient(135deg,#FFF5F7,#F3E8FF);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(0.95rem, 3.5vw, 1.2rem);
    color: var(--deep-pink);
    border: 1px dashed #FECDD3;
    transition: transform 0.6s ease 0.4s;
  }
  .envelope-letter.slide-out { transform: translateY(-60px); }
  .envelope-label {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 5vw, 1.6rem);
    color: var(--deep-purple);
    margin-top: 20px;
    animation: fadeIn 0.5s ease 0.3s both;
  }

  /* ===== BUTTONS ===== */
  .btn-next {
    background: linear-gradient(135deg, var(--deep-pink), var(--deep-purple));
    color: white; border: none;
    padding: clamp(10px, 3vw, 14px) clamp(24px, 8vw, 36px);
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(14px, 4vw, 16px);
    font-weight: 700;
    cursor: pointer; margin-top: 20px;
    box-shadow: 0 6px 20px rgba(236,72,153,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    opacity: 0;
  }
  .btn-next.show { animation: slideUp 0.6s ease forwards; }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(236,72,153,0.45); }
  .btn-next:active { transform: scale(0.97); }

  /* ===== SCENE 2 ===== */
  #scene2 { background: linear-gradient(160deg, #FFF0F5 0%, #F5F3FF 50%, #F0FFF4 100%); }

  .section-eyebrow { font-size: clamp(11px, 3vw, 13px); letter-spacing: 2px; text-transform: uppercase; color: var(--text-light); margin-bottom: 8px; }
  .section-title { font-family: 'Dancing Script', cursive; font-size: clamp(1.7rem, 6vw, 3rem); color: var(--deep-purple); margin-bottom: 28px; line-height: 1.2; }

  /* ===== PHOTO STAGE ===== */
  #photoStage {
    display: none;
    position: fixed; inset: 0; z-index: 800;
    background: rgba(20, 0, 15, 0.88);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  #photoStage.show { display: flex; }

  .stage-card {
    background: white; border-radius: 18px;
    padding: 14px 14px 42px;
    width: min(80vw, 300px);
    box-shadow: 0 0 0 4px rgba(255,182,193,0.5), 0 28px 70px rgba(0,0,0,0.55);
    position: relative;
    animation: stagePop 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes stagePop {
    0%  { opacity:0; transform: scale(0.4) translateY(50px) rotate(-5deg); }
    65% { opacity:1; transform: scale(1.06) translateY(-6px) rotate(1deg); }
    100%{ opacity:1; transform: scale(1) translateY(0) rotate(0deg); }
  }
  .stage-card.fly-away {
    animation: stageFly 0.45s cubic-bezier(0.55,0,1,0.45) forwards !important;
  }
  @keyframes stageFly {
    0%  { opacity:1; transform: scale(1) translate(0,0) rotate(0deg); }
    100%{ opacity:0; transform: scale(0.15) translate(var(--fx,0px),var(--fy,0px)) rotate(var(--fr,6deg)); }
  }
  .stage-img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; display:block; }
  .stage-caption {
    font-family:'Dancing Script',cursive;
    font-size: clamp(1rem, 4vw, 1.15rem);
    color:var(--deep-pink);
    text-align:center; margin-top:12px;
    animation: fadeIn 0.4s ease 0.35s both;
  }
  .stage-counter {
    position:absolute; top:-13px; right:-12px;
    background:var(--deep-pink); color:white;
    border-radius:50%; width:34px; height:34px;
    font-size:13px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px rgba(236,72,153,0.45);
    border:2px solid white;
  }
  .stage-hint {
    color: rgba(255,255,255,0.65);
    font-size: clamp(12px, 3.5vw, 13px);
    margin-top: 22px; letter-spacing: 0.5px;
    animation: pulse 2s ease infinite;
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: clamp(6px, 2vw, 12px);
    max-width: min(480px, 92vw);
    width: 100%;
    margin: 0 auto 32px;
  }
  .photo-card {
    aspect-ratio: 1; background: white; border-radius: clamp(8px, 2.5vw, 12px);
    padding: clamp(4px, 1.5vw, 8px) clamp(4px, 1.5vw, 8px) clamp(20px, 6vw, 28px);
    box-shadow: 0 4px 16px rgba(180,120,160,0.15);
    opacity: 0; transform: scale(0.5) rotate(var(--rot,0deg));
    position: relative; cursor: pointer; overflow: visible;
    transition: transform 0.28s ease, box-shadow 0.28s ease;
  }
  .photo-card:hover {
    transform: rotate(0deg) scale(1.07) !important;
    box-shadow: 0 10px 30px rgba(236,72,153,0.28); z-index: 2;
  }
  .photo-card.land {
    animation: cardLand 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes cardLand {
    0%  { opacity:0;  transform: scale(0.2) translateY(-80px) rotate(calc(var(--rot,0deg)*6)); }
    55% { opacity:1;  transform: scale(1.1) translateY(8px) rotate(calc(var(--rot,0deg)*0.6)); }
    75% { transform: scale(0.95) translateY(-3px) rotate(var(--rot,0deg)); }
    100%{ opacity:1;  transform: scale(1) translateY(0) rotate(var(--rot,0deg)); }
  }
  .photo-card .photo-img-wrap { width:100%; height:calc(100% - 18px); border-radius:8px; overflow:hidden; position:relative; }
  .photo-card img { width:100%; height:100%; object-fit:cover; display:block; border-radius:8px; }
  .photo-card .photo-secret {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(0deg,rgba(236,72,153,0.85) 0%,transparent 100%);
    color:white; font-size:10px; font-weight:700; padding:6px 4px 4px;
    border-radius:0 0 8px 8px;
    transform:translateY(100%); transition:transform 0.3s ease; text-align:center;
  }
  .photo-card:hover .photo-secret { transform:translateY(0); }
  .photo-caption { font-family:'Dancing Script',cursive; font-size:clamp(9px, 2.5vw, 13px); color:var(--text-light); text-align:center; margin-top:3px; line-height:1.2; }

  /* Message card */
  .message-card {
    background: white; border-radius: 20px;
    padding: clamp(18px, 5vw, 28px);
    max-width: 480px; width: 100%; margin: 0 auto 28px;
    box-shadow: 0 8px 32px rgba(180,120,160,0.12);
    border: 1.5px solid #FECDD3; position: relative;
  }
  .message-card::before {
    content: '"'; font-family: 'Dancing Script', cursive; font-size: 80px;
    color: var(--pink); position: absolute; top: -16px; left: 20px;
    line-height: 1; opacity: 0.5;
  }
  .message-card.revealed { animation: envelopeOpen 0.7s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes envelopeOpen {
    0%  { clip-path: inset(0 0 100% 0); opacity:0; }
    100%{ clip-path: inset(0 0 0% 0);   opacity:1; }
  }

  .tw-text {
    font-size: clamp(13px, 3.8vw, 15px);
    line-height: 1.8; color: var(--text);
    text-align: left; white-space: pre-wrap; min-height: 2em;
  }
  .tw-text::after {
    content: '|'; color: var(--deep-pink);
    animation: cursorBlink 0.7s step-end infinite;
    font-weight: 300;
  }
  .tw-text.done::after { display: none; }
  @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }

  .message-sig {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(18px, 5.5vw, 22px);
    color: var(--deep-pink);
    text-align: right; margin-top: 16px; display: inline-block; float: right;
  }
  .message-sig.beat { animation: heartbeat 1.4s ease infinite; }
  @keyframes heartbeat {
    0%,100%{transform:scale(1)} 14%{transform:scale(1.08)} 28%{transform:scale(1)} 42%{transform:scale(1.05)} 56%{transform:scale(1)}
  }

  /* Floating petals */
  .petal { position: fixed; pointer-events: none; z-index: 2; font-size: 18px; opacity: 0; animation: petalDrift linear forwards; }
  @keyframes petalDrift {
    0%  {opacity:0;transform:translateY(-20px) rotate(0deg)}
    10% {opacity:0.7}
    90% {opacity:0.4}
    100%{opacity:0;transform:translateY(100vh) rotate(200deg)}
  }

  /* ===== ENDING (dalam scene 2) ===== */
  #endingSection {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-bottom: 16px;
  }
  #endingSection.show { display: flex; }

  .heart-burst { font-size: 40px; animation: heartBurst 0.6s ease forwards; display: inline-block; }
  @keyframes heartBurst {
    0%{transform:scale(0);opacity:0} 60%{transform:scale(1.4);opacity:1} 100%{transform:scale(1);opacity:1}
  }
  .ending-msg { font-family: 'Dancing Script', cursive; font-size: clamp(1.6rem, 5.5vw, 2.6rem); color: var(--deep-purple); margin: 12px 0 8px; line-height: 1.3; }
  .ending-sub { font-size: clamp(13px, 4vw, 15px); color: var(--text-light); }

  /* Confetti */
  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 999; display: none; }

  .deco-hearts { position: absolute; font-size: 18px; opacity: 0.18; animation: floatHeart 6s ease-in-out infinite; pointer-events: none; }
  @keyframes floatHeart { 0%,100%{transform:translateY(0) rotate(-10deg)} 50%{transform:translateY(-20px) rotate(10deg)} }

  .btn-next-special { position: relative; overflow: visible !important; animation: none !important; }
  .btn-next-special.reveal { animation: btnBounceIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards, shimmerBtn 2.5s linear 1.5s infinite !important; }
  @keyframes btnBounceIn {
    0%{opacity:0;transform:scale(0.3) translateY(30px)} 55%{opacity:1;transform:scale(1.15) translateY(-8px)} 75%{transform:scale(0.95) translateY(4px)} 100%{opacity:1;transform:scale(1) translateY(0)}
  }
  @keyframes shimmerBtn {
    0%  {box-shadow:0 6px 20px rgba(236,72,153,0.35)}
    33% {box-shadow:0 6px 28px rgba(124,58,237,0.5),0 0 40px rgba(236,72,153,0.2)}
    66% {box-shadow:0 6px 28px rgba(236,72,153,0.55),0 0 40px rgba(167,243,208,0.3)}
    100%{box-shadow:0 6px 20px rgba(236,72,153,0.35)}
  }

  .btn-float-hearts { position: absolute; inset: 0; pointer-events: none; }
  .btn-float-hearts span { position: absolute; font-size: 16px; opacity: 0; animation: floatMiniHeart 3s ease-in-out infinite; }
  .btn-float-hearts span:nth-child(1){left:-20px;top:50%;animation-delay:0.2s}
  .btn-float-hearts span:nth-child(2){right:-18px;top:20%;animation-delay:0.8s}
  .btn-float-hearts span:nth-child(3){left:10%;top:-22px;animation-delay:1.4s}
  .btn-float-hearts span:nth-child(4){right:15%;top:-20px;animation-delay:0.5s}
  .btn-float-hearts span:nth-child(5){left:40%;bottom:-20px;animation-delay:1.1s}
  @keyframes floatMiniHeart {
    0%{opacity:0;transform:translateY(0) scale(0.5)} 30%{opacity:1} 70%{opacity:0.8} 100%{opacity:0;transform:translateY(-30px) scale(1.2)}
  }

  .btn-next-special.reveal::after {
    content: ''; position: absolute; inset: -4px; border-radius: 60px;
    background: linear-gradient(135deg,#FFB6C1,#D8B4FE,#A7F3D0,#FECBA1);
    z-index: -1; opacity: 0;
    animation: glowPulse 2s ease infinite; animation-delay: 0.7s;
  }
  @keyframes glowPulse { 0%,100%{opacity:0;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.05)} }

  .progress-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink); opacity: 0.3; transition: opacity 0.3s, transform 0.3s; }
  .dot.active { opacity: 1; transform: scale(1.3); background: var(--deep-pink); }

  @supports (padding: max(0px)) {
    .scene { padding-top: max(40px, env(safe-area-inset-top)); padding-bottom: max(40px, env(safe-area-inset-bottom)); }
    #muteBtn { bottom: max(24px, env(safe-area-inset-bottom)); right: max(24px, env(safe-area-inset-right)); }
  }

  @media (max-height: 500px) and (orientation: landscape) {
    .scene { padding: 20px 16px; min-height: auto; }
    .gift-box { width: min(100px, 28vw); height: min(88px, 24vw); }
    .gift-body { width: min(100px, 28vw); height: min(62px, 17vw); }
    .gift-lid { width: calc(min(100px, 28vw) + 8px); height: min(22px, 6vw); top: min(18px, 5vw); }
    .stage-card { width: min(50vw, 240px); }
  }
</style>
</head>
<body>

<div id="particles"></div>
<canvas id="confetti-canvas"></canvas>

<div id="envelopeOverlay">
  <div class="envelope-body">
    <div class="envelope-flap" id="envFlap"></div>
    <div class="envelope-letter" id="envLetter">💌 Untuk Ayang...</div>
  </div>
  <div class="envelope-label" id="envLabel">Membuka surat cinta... 🌸</div>
</div>

<!-- PHOTO SPOTLIGHT STAGE -->
<div id="photoStage">

    <div class="stage-counter" id="stageCounter">1/6</div>

<!-- ===== SCENE 1 ===== -->
<section class="scene active" id="scene1">

  <div class="deco-hearts" style="top:15%;right:10%;animation-delay:1.5s">🌸</div>
  <div class="deco-hearts" style="bottom:20%;left:5%;animation-delay:3s">✨</div>
  <div class="deco-hearts" style="bottom:15%;right:8%;animation-delay:2s">💝</div>

  <div class="progress-dots">
    <div class="dot active"></div><div class="dot"></div>
  </div>

  <p class="subtitle-top">Selamat Ulang Tahun 🎂</p>
  <h1 class="title-main">Yunia Puspasari</h1>

      <span class="gift-inner-star" style="font-size:12px">⭐</span>
      <span class="gift-inner-star" style="font-size:16px">💕</span>
      <div class="gift-bow">
        <div class="bow-left"></div><div class="bow-right"></div><div class="bow-center"></div>
      </div>
      <div class="gift-lid"></div>
      <div class="gift-body"></div>

<!-- ===== SCENE 2 ===== -->
<section class="scene" id="scene2">
  <div class="deco-hearts" style="top:8%;left:6%;animation-delay:1s">🌷</div>
  <div class="deco-hearts" style="top:12%;right:8%;animation-delay:2.5s">💜</div>

  <div class="progress-dots">
    <div class="dot"></div><div class="dot active"></div>
  </div>

  <p class="section-eyebrow">Kenangan Kita 📸</p>
  <h2 class="section-title">Untuk Ayang,<br>yang paling spesial 🌸</h2>

  <div class="photo-grid"></div>

  <div class="message-card" id="msgCard">

    <p class="ending-sub" id="endingSub" style="display:none">Aku sayang kamu, Loppu 💝</p>

  <div id="btnScene2Wrapper" style="position:relative;display:inline-block;margin-top:8px">

      <span>💕</span><span>✨</span><span>🌸</span><span>💝</span><span>⭐</span>

<audio id="bgMusic" loop preload="auto">
  <source src="Nuca_-_Masa_ini__Nanti__dan_Masa_Indah_Lainnya_Lirik_Lagu.mp3" type="audio/mp3">
</audio>

<button id="muteBtn" onclick="toggleMusic()" style="
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:white;border:2px solid #FFB6C1;border-radius:50%;
  width:52px;height:52px;font-size:22px;cursor:pointer;
  box-shadow:0 4px 20px rgba(255,100,120,0.25);
  display:flex;align-items:center;justify-content:center;transition:transform 0.2s;
  touch-action: manipulation;
">🔇</button>

<script>
// ===== PARTICLES =====
const particleColors = ['#FFB6C1','#D8B4FE','#A7F3D0','#FECBA1','#FCA5A5','#C4B5FD'];
const pCont = document.getElementById('particles');
for(let i=0;i<18;i++){
  const p = document.createElement('div');
  p.className = 'particle';
  const sz = 6 + Math.random()*10;
  p.style.cssText = `width:${sz}px;height:${sz}px;background:${particleColors[Math.floor(Math.random()*6)]};left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*8}s;`;
  pCont.appendChild(p);
}

// ===== KNOCK KNOCK =====
let giftOpened = false;
let knockCount = 0;

function autoKnock() {
  if (giftOpened) return;
  const box = document.getElementById('giftBox');
  box.classList.remove('knocking');
  box.offsetHeight;
  box.classList.add('knocking');
  knockCount++;
  setTimeout(() => box.classList.remove('knocking'), 600);
  if (knockCount < 4) setTimeout(autoKnock, 3500);
}
setTimeout(autoKnock, 2000);

function openGift() {
  if (giftOpened) return;
  giftOpened = true;
  const box = document.getElementById('giftBox');
  box.classList.add('opened');
  box.style.animation = 'none';
  box.style.cursor = 'default';

  const sparkCont = document.getElementById('sparkles');
  const emojis = ['✨','💕','🌸','💝','🌷','⭐','🎀'];
  for(let i=0;i<12;i++){
    const s = document.createElement('span');
    s.className = 'sparkle';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const angle = (Math.PI*2*i)/12;
    const dist = 60+Math.random()*50;
    s.style.setProperty('--tx', Math.cos(angle)*dist+'px');
    s.style.setProperty('--ty', Math.sin(angle)*dist+'px');
    s.style.left = '40%'; s.style.top = '30%';
    s.style.animationDelay = (i*0.05)+'s';
    sparkCont.appendChild(s);
    setTimeout(()=>s.classList.add('pop'), i*50);
  }
  setTimeout(()=>{ const btn=document.getElementById('btnNext1'); btn.classList.add('show'); }, 1200);
}

// ===== ENVELOPE TRANSITION =====
function triggerEnvelope() {
  const overlay = document.getElementById('envelopeOverlay');
  overlay.classList.add('show');
  setTimeout(()=>{ document.getElementById('envFlap').classList.add('open'); }, 800);
  setTimeout(()=>{ document.getElementById('envLetter').classList.add('slide-out'); }, 1500);
  setTimeout(()=>{ overlay.classList.remove('show'); goScene(2); }, 2300);
}

// ===== PHOTO DATA =====
const photoData = [
  { src: 'img1.jpeg', caption: 'our first Photo 📸😚',        secret: 'lagi lucu lucunya 😁',      rot: '-3deg'  },
  { src: 'img2.jpeg', caption: 'ke bioskop, cuma kita berdua 😊', secret: 'movies 🎞️',             rot: '2deg'   },
  { src: 'img3.jpeg', caption: 'perjalanan jauh pertama kita 😎', secret: 'love it 🥰',             rot: '-2deg'  },
  { src: 'img4.jpeg', caption: 'ke kebun binatang 😘',          secret: 'liat kudanil yah yank 😜', rot: '3deg'   },
  { src: 'img5.jpeg', caption: 'Kita berdua di depan kaca 💏',   secret: 'momen terbaik cibodas 💕', rot: '-1deg'  },
  { src: 'img6.jpeg', caption: 'ini ayank aku cantik kan 😍',    secret: 'My sweety 😘',             rot: '2.5deg' },
];

function buildPhotoGrid() {
  const grid = document.querySelector('.photo-grid');
  grid.innerHTML = '';
  photoData.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.setProperty('--rot', p.rot);
    card.id = 'pcard-' + i;
    card.innerHTML = `
      <div class="photo-img-wrap">
        <img src="${p.src}" alt="${p.caption}">
        <div class="photo-secret">${p.secret}</div>
      </div>
      <p class="photo-caption">${p.caption}</p>`;
    grid.appendChild(card);
  });
}

function revealParagraphs() {
  const fullText = `Hai Cantik... 🥰

Selamat ulang tahun, sayang! 🎂 it's your special day, sayang wish u all the best, maacii sayang udaa lahir ke dunia ini dan jadi pasanganku. 💕

selamat bertumbuh jadi versi yang lebih baik setiap harinya, sayangku, cintaku. panjang umur dan sehat selalu ya sayangg, biar kita bisa bareng terus 💗

Terimakasih sudah menjadi wanita hebat yang berjuang sampai sejauh ini yah 🥹, aku akan selalu ada buat sayang, disetiap proses, disetiap hari, aku selalu sama sayangg 💝

semoga Allah mengabulkan hal-hal baik yang benar-benar diinginkan hati sayangg. 🤲

Semoga hari ini dan seterusnya akan menjadi hari yang selalu terbaik yang pernah kamu rasakan. ✨`;

  const el = document.getElementById('twMsg');
  el.textContent = '';
  let i = 0;
  const iv = setInterval(() => {
    el.textContent += fullText[i];
    i++;
    if (i >= fullText.length) {
      clearInterval(iv);
      el.classList.add('done');
      const sig = document.getElementById('messageSig');
      sig.style.display = 'block';
      setTimeout(()=>sig.classList.add('beat'), 300);
      setTimeout(revealScene2Button, 600);
    }
  }, 24);
}

function startPhotoShow(onDone) {
  buildPhotoGrid();
  const stage        = document.getElementById('photoStage');
  const stageCard    = document.getElementById('stageCard');
  const stageImg     = document.getElementById('stageImg');
  const stageCaption = document.getElementById('stageCaption');
  const stageCounter = document.getElementById('stageCounter');
  const total = photoData.length;
  let idx = 0;

  document.body.style.overflow = 'hidden';
  stage.classList.add('show');

  function showNext() {
    if (idx >= total) {
      stage.classList.remove('show');
      document.body.style.overflow = '';
      if (onDone) onDone();
      return;
    }
    const data = photoData[idx];
    stageCounter.textContent = (idx+1) + '/' + total;
    stageCaption.textContent = data.caption;
    stageImg.src = data.src;

    stageCard.classList.remove('fly-away');
    stageCard.style.animation = 'none';
    stageCard.offsetHeight;
    stageCard.style.animation = '';

    setTimeout(() => {
      const gridCard  = document.getElementById('pcard-' + idx);
      const gridRect  = gridCard.getBoundingClientRect();
      const stageRect = stageCard.getBoundingClientRect();
      const fx = (gridRect.left + gridRect.width/2)  - (stageRect.left + stageRect.width/2);
      const fy = (gridRect.top  + gridRect.height/2) - (stageRect.top  + stageRect.height/2);

      stageCard.style.setProperty('--fx', fx + 'px');
      stageCard.style.setProperty('--fy', fy + 'px');
      stageCard.style.setProperty('--fr', data.rot);
      stageCard.classList.add('fly-away');

      setTimeout(() => {
        gridCard.classList.add('land');
        idx++;
        setTimeout(showNext, 500);
      }, 400);
    }, 2500);
  }

  showNext();
}

// ===== PETALS =====
function launchPetals() {
  const petalEmojis = ['🌸','🌷','🌹','💮'];
  let count = 0;
  const iv = setInterval(()=>{
    if(count >= 10){ clearInterval(iv); return; }
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random()*4)];
    p.style.left = (10+Math.random()*80)+'%';
    p.style.top = '-30px';
    const dur = 5+Math.random()*4;
    p.style.animationDuration = dur+'s';
    p.style.animationDelay = (Math.random()*1.5)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), (dur+2)*1000);
    count++;
  }, 700);
}

function revealScene2Button() {
  const btn = document.getElementById('btnNext2');
  const hearts = document.getElementById('btnHearts');
  btn.style.display = 'inline-block';
  hearts.style.display = 'block';
  setTimeout(()=>btn.classList.add('show','reveal'), 100);

  const wrapper = document.getElementById('btnScene2Wrapper');
  const emojis = ['💕','✨','🌸','💝','🌷'];
  for(let i=0;i<6;i++){
    const s = document.createElement('span');
    s.textContent = emojis[Math.floor(Math.random()*5)];
    s.style.cssText = `position:absolute;font-size:18px;pointer-events:none;z-index:10;left:${20+Math.random()*60}%;top:-10px;opacity:0;animation:sparkleOut 1s ease ${i*0.12}s forwards;--tx:${(Math.random()-0.5)*80}px;--ty:${-40-Math.random()*40}px;`;
    wrapper.appendChild(s);
    setTimeout(()=>s.remove(), 1500);
  }
}

// ===== SCENE NAVIGATION =====
function goScene(n) {
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById('scene'+n).classList.add('active');
  window.scrollTo(0,0);

  if(n===2){
    startPhotoShow(() => {
      launchPetals();
      const msgCard = document.getElementById('msgCard');
      setTimeout(()=>msgCard.classList.add('revealed'), 200);
      setTimeout(revealParagraphs, 400);
    });
  }
}

// ===== FINAL CLICK (ending di scene 2) =====
function finalClick() {
  document.getElementById('btnScene2Wrapper').style.display = 'none';
  const endSec = document.getElementById('endingSection');
  endSec.classList.add('show');
  document.getElementById('heartBurstEl').style.display = 'block';
  setTimeout(()=>{
    document.getElementById('endingTitle').style.display = 'block';
    document.getElementById('endingSub').style.display = 'block';
  }, 600);
  launchPetals();
  launchConfetti();
}

// ===== CONFETTI =====
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#FFB6C1','#D8B4FE','#A7F3D0','#FECBA1','#FCA5A5','#FDE68A'];
  const pieces = [];
  for(let i=0;i<130;i++){
    pieces.push({
      x:Math.random()*canvas.width, y:-20-Math.random()*100,
      size:6+Math.random()*8, color:colors[Math.floor(Math.random()*6)],
      speed:2+Math.random()*4, angle:Math.random()*360,
      spin:(Math.random()-0.5)*6, drift:(Math.random()-0.5)*2
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size/2);
      ctx.restore();
      p.y+=p.speed; p.x+=p.drift; p.angle+=p.spin;
    });
    frame++;
    if(frame<200) requestAnimationFrame(draw);
    else canvas.style.display='none';
  }
  draw();
}

// ===== MUSIK =====
var music = document.getElementById('bgMusic');
var muteBtn = document.getElementById('muteBtn');
var musicStarted = false;

function startMusic(){
  if(!musicStarted && music){
    music.volume = 0.5;
    music.currentTime = 11;
    music.play().then(()=>{ musicStarted=true; muteBtn.textContent='🎵'; }).catch(()=>{});
  }
}
function toggleMusic(){
  if(!music) return;
  if(music.paused){ music.play(); muteBtn.textContent='🎵'; }
  else{ music.pause(); muteBtn.textContent='🔇'; }
}
document.addEventListener('click', startMusic, {once:true});
document.addEventListener('touchstart', startMusic, {once:true});
</script>
